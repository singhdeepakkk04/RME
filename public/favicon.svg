<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Matches the in-app LogoMark: a node network with an accent green hub. -->
  <rect width="32" height="32" rx="7" fill="#14130f"/>

  <!-- edges -->
  <g stroke="#fbfaf8" stroke-width="1.6" stroke-linecap="round" opacity="0.8">
    <path d="M16 16 6.5 8.5"/>
    <path d="M16 16 25.5 7.5"/>
    <path d="M16 16 25 25"/>
    <path d="M16 16 7.5 24.5"/>
    <path d="M6.5 8.5 25.5 7.5"/>
    <path d="M25.5 7.5 25 25"/>
  </g>

  <!-- outer nodes -->
  <g fill="#14130f" stroke="#fbfaf8" stroke-width="1.5">
    <circle cx="6.5" cy="8.5" r="2.6"/>
    <circle cx="25.5" cy="7.5" r="2.6"/>
    <circle cx="25" cy="25" r="2.6"/>
    <circle cx="7.5" cy="24.5" r="2.6"/>
  </g>

  <!-- accent hub with orbit ring -->
  <circle cx="16" cy="16" r="6" fill="none" stroke="#5fb98c" stroke-width="1.2" opacity="0.45"/>
  <circle cx="16" cy="16" r="4" fill="#2f855a" stroke="#7ec79f" stroke-width="0.8"/>
</svg>
