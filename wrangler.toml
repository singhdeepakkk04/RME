# Cloudflare Workers static-assets deployment for the RME landing site.
#
# Cloudflare's build runs `wrangler deploy`, so this configures a Worker that
# serves the compiled static site directly from ./dist. No Worker script is
# needed: with an [assets] directory and no `main`, Cloudflare serves the
# assets natively.
name = "rme"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
# Serve index.html for unknown paths so the single-page app always resolves.
not_found_handling = "single-page-application"
